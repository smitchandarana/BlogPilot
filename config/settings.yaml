ai:
  max_tokens: 500
  model: llama-3.3-70b-versatile
  provider: groq
  retry_attempts: 2
  retry_delay_seconds: 2
  temperature: 0.7
analytics:
  export_format: csv
  weekly_summary_enabled: true
browser:
  headless: false
  profile_path: ./browser_profile
  slow_mo_ms: 80
  stealth: true
  type: chromium
  viewport_height: 768
  viewport_width: 1366
circuit_breaker:
  captcha_detected_action: pause
  enabled: true
  error_threshold: 3
  pause_duration_minutes: 30
  window_minutes: 10
content_studio:
  auto_publish: false
  default_tone: professional
  default_word_count: 150
daily_budget:
  comments: 12
  connections: 15
  endorsements: 10
  feed_scans: 0
  follows: 20
  inmails: 5
  likes: 30
  posts_published: 5
  profile_visits: 50
delays:
  before_comment_max: 45
  before_comment_min: 8
  before_connect_max: 20
  before_connect_min: 5
  before_like_max: 12
  before_like_min: 3
  between_posts_max: 15
  between_posts_min: 4
  typing_speed_wpm_max: 65
  typing_speed_wpm_min: 35
email_enrichment:
  enabled: true
  max_pattern_attempts: 5
  smtp_timeout_seconds: 5
  use_dom_scraper: true
  use_hunter_api: false
  use_pattern_generator: true
  use_smtp_verifier: true
engine:
  enabled: true
  log_level: INFO
feed_engagement:
  max_posts_per_scan: 30
  min_relevance_score: 6
  mode: smart
  preview_comments: false
  score_for_connection: 10
  score_for_profile_visit: 8
  scroll_passes: 3
modules:
  campaigns: false
  content_studio: true
  email_enrichment: false
  feed_engagement: true
  influencer_monitor: true
  reply_monitoring: false
  viral_detection: true
rate_limits:
  comments_per_hour: 4
  connections_per_hour: 5
  likes_per_hour: 8
  profile_visits_per_hour: 15
schedule:
  active_days:
  - monday
  - tuesday
  - wednesday
  - thursday
  - friday
  - saturday
  - sunday
  end_hour: 23
  feed_scan_interval_minutes: 30
  start_hour: 9
  timezone: Asia/Kolkata
storage:
  database_path: ./data/engine.db
  log_retention_days: 90
viral_detection:
  comments_per_hour_threshold: 10
  likes_per_hour_threshold: 50
  priority_boost: high
topic_rotation:
  enabled: true
  target_active_count: 8
  min_posts_before_scoring: 10
  low_engagement_threshold: 0.15
  max_new_topics_per_cycle: 2
  min_active_topics: 5
  retry_paused_after_days: 7
  cycle_interval_hours: 24
workers:
  max_threads: 3
  queue_max_size: 100
quality:
  min_post_score: 7
  min_comment_score: 5
  comment_candidates: 3
  diversity_threshold: 0.7
  max_recent_comments_for_diversity: 20
  winning_example_min_score: 8

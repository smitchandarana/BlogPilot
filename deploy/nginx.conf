# BlogPilot — nginx site config
# Install: sudo cp /opt/blogpilot/deploy/nginx.conf /etc/nginx/sites-available/blogpilot
#          sudo ln -sf /etc/nginx/sites-available/blogpilot /etc/nginx/sites-enabled/blogpilot
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx

# ── Frontend — app.phoenixsolution.in ─────────────────────────────────────
server {
    listen 80;
    server_name app.phoenixsolution.in;

    root /opt/blogpilot/ui/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # SPA: serve index.html for all non-file routes
    location / {
        try_files $uri /index.html;
    }

    # Cache hashed assets forever
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ── Platform API + container proxy — api.phoenixsolution.in ───────────────
server {
    listen 80;
    server_name api.phoenixsolution.in;

    client_max_body_size 50M;

    # WebSocket proxy for /u/{user_id}/ws
    location ~ ^/u/[^/]+/ws$ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # All other requests → platform API (including /u/{user_id}/... HTTP proxy)
    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }
}

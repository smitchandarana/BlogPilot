# BlogPilot — nginx site config (single domain)
# Everything through app.phoenixsolution.in — api subdomain not exposed.
#
# Install: sudo cp /opt/blogpilot/deploy/nginx.conf /etc/nginx/sites-available/blogpilot
#          sudo ln -sf /etc/nginx/sites-available/blogpilot /etc/nginx/sites-enabled/blogpilot
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name app.phoenixsolution.in;

    root /opt/blogpilot/ui/dist;
    index index.html;
    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ── WebSocket proxy for user containers ──────────────────────────
    location ~ ^/u/[^/]+/ws$ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # ── Platform API + container HTTP proxy ──────────────────────────
    location /platform/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    location /u/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /health {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── React SPA — all other paths ──────────────────────────────────
    location / {
        try_files $uri /index.html;
    }

    # Cache hashed assets forever
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

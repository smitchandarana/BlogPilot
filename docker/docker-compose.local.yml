version: "3.9"

# Local PC deployment — Cloudflare Tunnel handles SSL and public routing.
# No Traefik needed. Platform API exposed on port 80 for the tunnel.

networks:
  blogpilot-net:
    name: blogpilot-net

volumes:
  postgres-data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: blogpilot_platform
      POSTGRES_USER: blogpilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - blogpilot-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blogpilot"]
      interval: 10s
      timeout: 5s
      retries: 3

  platform-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.platform
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "80:9000"
    environment:
      DATABASE_URL: postgresql://blogpilot:${POSTGRES_PASSWORD}@postgres:5432/blogpilot_platform
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      BLOGPILOT_ENV: production
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      BLOGPILOT_IMAGE: blogpilot-backend:latest
      VOLUME_BASE_PATH: /app/volumes/users
      PORT_RANGE_START: "10000"
      PORT_RANGE_END: "10099"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@phoenixsolution.in}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://app.phoenixsolution.in,http://localhost:3000}
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./volumes:/app/volumes
    networks:
      - blogpilot-net

# BlogPilot — Oracle ARM VM (Cloudflare Tunnel + Tailscale exit node)
# No public ports. Tunnel is outbound-only. SSH via Tailscale.
# All outbound traffic from user containers routes through Tailscale exit node (phoenix01 - 100.82.242.22)

networks:
  blogpilot-net:
    name: blogpilot-net

volumes:
  postgres-data:
  tailscale-state:

services:
  # ── Tailscale sidecar ────────────────────────────────────────────────────
  # Routes ALL container traffic through phoenix01 (your home IP) as exit node.
  # LinkedIn sees your residential IP, not Oracle datacenter IP.
  tailscale:
    image: tailscale/tailscale:latest
    hostname: blogpilot-oracle
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTHKEY:?TAILSCALE_AUTHKEY must be set in .env}
      TS_EXTRA_ARGS: --exit-node=100.82.242.22 --exit-node-allow-lan-access --accept-routes
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun
    networks:
      - blogpilot-net

  # ── Docker socket proxy ──────────────────────────────────────────────────
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      IMAGES: 1
      SERVICES: 0
      TASKS: 0
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - blogpilot-net

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: blogpilot_platform
      POSTGRES_USER: blogpilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - blogpilot-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blogpilot"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "0.5"

  # ── Platform API ─────────────────────────────────────────────────────────
  platform-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.platform
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      docker-proxy:
        condition: service_started
      tailscale:
        condition: service_started
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      DATABASE_URL: postgresql://blogpilot:${POSTGRES_PASSWORD}@postgres:5432/blogpilot_platform
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      BLOGPILOT_ENV: production
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      BLOGPILOT_IMAGE: blogpilot-backend:latest
      VOLUME_BASE_PATH: /app/volumes/users
      PORT_RANGE_START: "10000"
      PORT_RANGE_END: "10099"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@phoenixsolution.in}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://app.phoenixsolution.in,http://localhost:3000}
      DOCKER_HOST: tcp://docker-proxy:2375
      APP_BASE_URL: ${APP_BASE_URL:-https://app.phoenixsolution.in}
      REQUIRE_SIGNUP_APPROVAL: ${REQUIRE_SIGNUP_APPROVAL:-false}
      # ARM resource limits for user containers
      CONTAINER_MEMORY_LIMIT: ${CONTAINER_MEMORY_LIMIT:-1536m}
      CONTAINER_CPU_LIMIT: ${CONTAINER_CPU_LIMIT:-0.75}
      # Tailscale exit node for user containers
      TAILSCALE_EXIT_NODE: "100.82.242.22"
    volumes:
      - ./volumes:/app/volumes
    networks:
      - blogpilot-net

api:
  dashboard: true
  insecure: true  # Dev only — disable in production

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "tcp://docker-proxy:2375"
    exposedByDefault: false
    network: blogpilot-net
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@phoenixsolution.in
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
